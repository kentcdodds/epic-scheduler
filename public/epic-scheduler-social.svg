		</linearGradient>
		<linearGradient id="social-panel" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#ffffff" stop-opacity="0.17" />
			<stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
		</linearGradient>
	</defs>

	<rect width="1200" height="630" fill="url(#social-bg)" />
	<rect x="96" y="86" width="1008" height="458" rx="36" fill="url(#social-panel)" />

	<g transform="translate(164 150)">
